name: Notify Slack on Update

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Article and Send Message
        run: |
          # Turn off immediate exit so formatting quirks don't crash the robot
          set +e 
          
          # 1. Grab the exact line containing the first link
          LINK_LINE=$(grep -m 1 'href=' index.html)
          
          # 2. Extract URL and Title using a highly forgiving method
          URL=$(echo "$LINK_LINE" | sed -n "s/.*href=['\"]\([^'\"]*\)['\"].*/\1/p")
          TITLE=$(echo "$LINK_LINE" | sed -n 's/.*>\([^<]*\)<\/a>.*/\1/p')
          
          # 3. Format and send the message to Slack
          PAYLOAD=$(jq -n --arg title "$TITLE" --arg url "$URL" '{text: "📢 *Very Important Article!*\n\n<\($url)|\($title)>"}')
          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" ${{ secrets.SLACK_WEBHOOK }}

name: Notify Slack on Update

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Message
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"📢 *New Article Published!* \nA new update was just added to the Knowledge Hub. \n🔗 <https://waleed0-blip.github.io/knowledge-hub/|Read it here>"}' \
          ${{ secrets.SLACK_WEBHOOK }}
